name: Deploy OMA Frontend to S3

on:
	push:
		branches:
			- main # Make sure this matches your branch name (main or master)
		paths:
			- 'OMA - frontend/**' # Only runs when you change frontend code

jobs:
	build-and-deploy:
		runs-on: ubuntu-latest

		# This tells GitHub to enter your frontend folder before running commands
		defaults:
			run:
				working-directory: './OMA - frontend'

		steps:
			- name: Checkout Code
				uses: actions/checkout@v4

			- name: Setup Node.js
				uses: actions/setup-node@v4
				with:
					node-version: '20'

			- name: Install Dependencies
				run: npm install

			- name: Build Vite App
				run: npm run build

			- name: Configure AWS Credentials
				uses: aws-actions/configure-aws-credentials@v4
				with:
					aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
					aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
					aws-region: ap-south-2 # Hyderabad Region

			- name: Deploy to S3
				# We sync the 'dist' folder because that is where Vite puts the build
				run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

